<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EXORCIST | 訂閱退散 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+TC:wght@300;500;700&family=Russo+One&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepBlack: '#0a0a0a',
                        stRed: '#b91c1c',
                        glassWhite: 'rgba(255, 255, 255, 0.05)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        display: ['Russo One', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #000; 
            background-image: 
                radial-gradient(circle at 50% -20%, #350000 0%, #000 80%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .st-accent {
            color: #b91c1c;
            letter-spacing: 0.2em;
            text-shadow: 0 0 15px rgba(185, 28, 28, 0.4);
        }
        .progress-bg { background: rgba(255, 255, 255, 0.1); height: 3px; border-radius: 2px; overflow: hidden; }
        .progress-fill { background: #b91c1c; height: 100%; transition: width 1s ease-out; }
        .btn-premium {
            background: #b91c1c;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.1em;
        }
        .btn-premium:hover {
            background: #ef4444;
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(185, 28, 28, 0.5);
        }
        input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s !important;
        }
        input:focus {
            border-color: #b91c1c !important;
            background: rgba(255, 255, 255, 0.08) !important;
        }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen">
    <div class="max-w-lg mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-xs st-accent font-semibold mb-2">FINANCIAL EXORCIST SYSTEM</h1>
            <h2 class="text-4xl font-display tracking-tighter">訂閱退散 <span class="text-stRed">PRO</span></h2>
            <div class="h-[1px] w-12 bg-stRed mx-auto mt-4"></div>
        </header>

        <!-- 總計儀表板 -->
        <div class="glass-card rounded-2xl p-8 mb-10 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-stRed to-transparent opacity-50"></div>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em] mb-2 font-medium">Monthly Outflow / 每月支出</p>
            <h3 id="total-cost" class="text-6xl font-light tracking-tighter mb-4">$ 0</h3>
            <p id="roast-summary" class="text-xs text-gray-400 italic font-light tracking-wide"></p>
        </div>

        <!-- 輸入面板 -->
        <div class="glass-card rounded-2xl p-6 mb-12">
            <div class="grid grid-cols-1 gap-4">
                <input id="sub-name" type="text" placeholder="服務名稱" class="w-full p-4 rounded-xl text-sm outline-none">
                <div class="flex gap-4">
                    <input id="sub-price" type="number" placeholder="金額 (TWD)" class="w-1/2 p-4 rounded-xl text-sm outline-none">
                    <input id="sub-day" type="number" min="1" max="31" placeholder="扣款日" class="w-1/2 p-4 rounded-xl text-sm outline-none">
                </div>
                <button onclick="addSubscription()" class="btn-premium w-full py-4 rounded-xl font-bold text-sm text-white">
                    CONFIRM SUBSCRIPTION
                </button>
            </div>
        </div>

        <!-- 列表清單 -->
        <div id="sub-list" class="space-y-6 pb-24"></div>
    </div>

    <script>
        let subs = JSON.parse(localStorage.getItem('my_subscriptions_v2')) || [];

        function addSubscription() {
            const name = document.getElementById('sub-name').value.trim();
            const price = parseFloat(document.getElementById('sub-price').value);
            const day = parseInt(document.getElementById('sub-day').value);

            if (!name || isNaN(price) || isNaN(day) || day < 1 || day > 31) {
                alert("資料輸入不完整或錯誤。"); return;
            }

            subs.push({ id: Date.now(), name, price, day, active: true });
            saveAndRender();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function toggleStatus(id) {
            const sub = subs.find(s => s.id === id);
            sub.active = !sub.active;
            saveAndRender();
        }

        function removeSub(id) {
            if(confirm("確定刪除此項監控？")) {
                subs = subs.filter(s => s.id !== id);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('my_subscriptions_v2', JSON.stringify(subs));
            render();
        }

        function getDaysUntil(payDay) {
            const now = new Date();
            const today = now.getDate();
            const lastDayOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const targetDay = Math.min(payDay, lastDayOfMonth);
            return today <= targetDay ? targetDay - today : (lastDayOfMonth - today) + targetDay;
        }

        function render() {
            const listEl = document.getElementById('sub-list');
            const totalEl = document.getElementById('total-cost');
            const summaryEl = document.getElementById('roast-summary');
            listEl.innerHTML = ''; let total = 0;

            subs.sort((a, b) => getDaysUntil(a.day) - getDaysUntil(b.day)).forEach(sub => {
                if (sub.active) total += sub.price;
                const daysLeft = getDaysUntil(sub.day);
                const progress = ((30 - daysLeft) / 30) * 100;
                const isSoon = daysLeft <= 3;

                listEl.innerHTML += `
                    <div class="relative group">
                        <div class="glass-card rounded-2xl p-6 transition-all duration-500 ${sub.active ? 'border-l-4 border-l-stRed' : 'opacity-40 grayscale'}">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h4 class="text-lg font-semibold text-white tracking-tight">${sub.name}</h4>
                                    <p class="text-[10px] ${isSoon ? 'text-stRed font-bold' : 'text-gray-500'} uppercase tracking-widest mt-1">
                                        ${sub.active ? `Next Charge: In ${daysLeft} Days` : 'Subscription Paused'}
                                    </p>
                                </div>
                                <div class="text-right">
                                    <span class="text-2xl font-light tracking-tighter">$${sub.price.toLocaleString()}</span>
                                </div>
                            </div>
                            
                            <div class="progress-bg mb-4">
                                <div class="progress-fill" style="width: ${sub.active ? progress : 0}%"></div>
                            </div>

                            <div class="flex justify-between items-center">
                                <button onclick="toggleStatus(${sub.id})" class="text-[10px] text-gray-400 hover:text-white transition tracking-widest uppercase">
                                    [ ${sub.active ? 'Disable' : 'Enable'} ]
                                </button>
                                <button onclick="removeSub(${sub.id})" class="text-[10px] text-gray-600 hover:text-stRed transition uppercase">Remove</button>
                            </div>
                        </div>
                    </div>`;
            });

            totalEl.innerText = `$ ${total.toLocaleString()}`;
            summaryEl.innerText = total > 2000 ? "DETECTED: SEVERE WALLET HEMORRHAGE." : "STATUS: NORMAL FINANCE LEVELS.";
        }
        render();
    </script>
</body>
</html>
