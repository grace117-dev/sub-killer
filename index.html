<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂閱退散 - 強化清晰版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --stranger-red: #ff0512; /* 提高鮮豔度 */
            --deep-red: #a30000;
            --warning-orange: #ffc400;
            --text-main: #ffffff;
            --text-sub: #b3b3b3; /* 提高次要文字亮度 */
        }

        body { 
            background-color: #080808; /* 稍微提升背景亮度 */
            color: var(--text-main); 
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 減少掃描線干擾，增加清晰度 */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 100;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .stranger-title {
            font-weight: 900;
            color: var(--stranger-red);
            text-shadow: 0 0 15px var(--stranger-red);
            transform: skew(-3deg);
        }

        .neon-card {
            background: #121212; /* 提升卡片背景色 */
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .storage-warning {
            color: var(--warning-orange);
            text-shadow: 0 0 5px rgba(255, 196, 0, 0.5);
        }

        /* 輸入框與選擇器加亮 */
        input, select {
            background: #1a1a1a !important;
            border: 2px solid #333 !important;
            color: #ffffff !important;
            font-size: 1.1rem !important; /* 放大字體 */
        }

        input:focus {
            border-color: var(--stranger-red) !important;
            background: #222 !important;
        }

        .btn-exorcise {
            background: var(--stranger-red);
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-exorcise:active { transform: scale(0.98); }

        .label-text {
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-lg mx-auto relative z-10">
        <header class="text-center mb-8">
            <h1 class="text-5xl md:text-6xl stranger-title mb-2">訂閱退散</h1>
            <p class="text-sm text-gray-400 tracking-[0.3em] font-bold">錢包守護者系統</p>
        </header>

        <!-- 數據面板：加強對比 -->
        <div class="neon-card rounded-lg p-8 mb-8 border-l-8 border-l-red-600">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-400 font-bold uppercase mb-1">平均每月損耗</p>
                    <h3 id="total-monthly" class="text-5xl font-black text-white">$ 0</h3>
                </div>
                <div class="text-right">
                    <p class="text-xs text-red-500 font-black uppercase mb-1">年度累積失血</p>
                    <p id="total-yearly" class="text-2xl font-black text-red-500">$ 0</p>
                </div>
            </div>
            <p id="roast-summary" class="text-sm italic mt-6 text-gray-300 border-t border-gray-800 pt-4 font-bold"></p>
        </div>

        <!-- 核心警告：更清晰 -->
        <div class="mb-8 p-5 border-2 border-dashed border-yellow-600 bg-yellow-900/20 rounded-lg">
            <p class="text-sm storage-warning font-black mb-1">⚠️ 重要提示：資料儲存說明</p>
            <p class="text-sm text-gray-200 leading-relaxed">
                本系統將資料儲存於您的**瀏覽器本地端**。若您執行「清除瀏覽器資料」或「更換手機/電腦」，目前的紀錄將會**全部消失**。
            </p>
        </div>

        <!-- 輸入區域：標籤強化 -->
        <div class="neon-card p-6 mb-10 rounded-lg">
            <div class="space-y-6">
                <div>
                    <label class="label-text">服務名稱</label>
                    <input id="sub-name" type="text" placeholder="例如：Netflix / Spotify" class="w-full p-4 rounded-md outline-none">
                </div>
                
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="label-text">訂閱金額</label>
                        <input id="sub-price" type="number" placeholder="金額" class="w-full p-4 rounded-md outline-none">
                    </div>
                    <div>
                        <label class="label-text">付款週期</label>
                        <select id="sub-cycle" class="w-full p-4 rounded-md outline-none font-bold">
                            <option value="1">月付</option>
                            <option value="3">季付</option>
                            <option value="12">年付</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="label-text text-red-400">📅 設定下次扣款日期</label>
                    <input id="sub-date" type="date" class="w-full p-4 rounded-md outline-none">
                </div>

                <button onclick="addSubscription()" class="w-full btn-exorcise py-5 text-white rounded-md shadow-lg">
                    承認我是盤子並記錄
                </button>
            </div>
        </div>

        <!-- 列表區域 -->
        <h3 class="text-lg font-black mb-4 border-b-2 border-red-600 pb-2 inline-block">目前供奉清單</h3>
        <div id="sub-list" class="space-y-6 pb-24"></div>

    </div>

    <!-- 預警彈窗：大字版 -->
    <div id="alert-modal" class="hidden fixed inset-0 bg-black/98 backdrop-blur-md flex items-center justify-center p-6 z-[200]">
        <div class="neon-card border-4 border-red-600 p-10 w-full max-w-sm text-center rounded-xl">
            <h2 class="text-5xl font-black text-red-600 italic mb-4">快醒醒！</h2>
            <div id="alert-content" class="text-lg text-white font-bold leading-relaxed mb-8"></div>
            <button onclick="closeAlert()" class="w-full py-4 bg-white text-black font-black hover:bg-red-600 hover:text-white transition-all text-lg rounded-md">
                我有錢我任性
            </button>
        </div>
    </div>

    <script>
        let subs = JSON.parse(localStorage.getItem('my_subscriptions')) || [];

        window.onload = () => {
            render();
            checkWarnings();
        };

        function addSubscription() {
            const name = document.getElementById('sub-name').value;
            const price = parseFloat(document.getElementById('sub-price').value);
            const cycle = parseInt(document.getElementById('sub-cycle').value);
            const date = document.getElementById('sub-date').value;

            if (!name || isNaN(price) || !date) return alert("請填寫完整資訊！");

            subs.push({ id: Date.now(), name, price, cycle, date });
            saveAndRender();
            
            document.getElementById('sub-name').value = '';
            document.getElementById('sub-price').value = '';
        }

        function saveAndRender() {
            localStorage.setItem('my_subscriptions', JSON.stringify(subs));
            render();
        }

        function checkWarnings() {
            const today = new Date();
            const limit = new Date();
            limit.setDate(today.getDate() + 3);

            let warnings = subs.filter(s => {
                const d = new Date(s.date);
                return d >= today && d <= limit;
            });

            if (warnings.length > 0) {
                document.getElementById('alert-modal').classList.remove('hidden');
                document.getElementById('alert-content').innerHTML = `這幾天又要扣款了：<br><br>` + 
                    warnings.map(w => `<span class="text-red-500 text-xl font-black">${w.name}</span> ($${w.price})`).join('<br>');
            }
        }

        function closeAlert() { document.getElementById('alert-modal').classList.add('hidden'); }

        function removeSub(id) {
            if(confirm("確定要剪掉這筆訂閱？")) {
                subs = subs.filter(s => s.id !== id);
                saveAndRender();
            }
        }

        function render() {
            const listEl = document.getElementById('sub-list');
            let mTotal = 0;

            subs.sort((a,b) => new Date(a.date) - new Date(b.date));
            listEl.innerHTML = '';

            subs.forEach(s => {
                const mPrice = s.price / s.cycle;
                mTotal += mPrice;
                const cycleText = s.cycle === 12 ? '年度' : (s.cycle === 3 ? '每季' : '每月');

                listEl.innerHTML += `
                    <div class="neon-card p-6 rounded-lg relative border-t-2 border-t-gray-800">
                        <button onclick="removeSub(${s.id})" class="absolute top-4 right-4 text-sm font-bold text-gray-500 hover:text-red-500 underline">刪除項目</button>
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <h4 class="text-white font-black text-2xl italic tracking-tight uppercase">${s.name}</h4>
                                <span class="text-xs bg-red-900/50 text-red-200 font-bold px-3 py-1 mt-2 inline-block rounded">${cycleText}訂閱</span>
                            </div>
                            <div class="text-right">
                                <p class="text-3xl font-black text-white">$${s.price.toLocaleString()}</p>
                                <p class="text-xs text-gray-400 mt-2 font-bold">下次扣款：${s.date}</p>
                            </div>
                        </div>
                        <div class="text-sm text-gray-400 border-t border-gray-800 pt-4 font-bold flex justify-between">
                            <span>系統換算：平均每月 $${Math.round(mPrice)}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-monthly').innerText = `$ ${Math.round(mTotal).toLocaleString()}`;
            document.getElementById('total-yearly').innerText = `$ ${Math.round(mTotal * 12).toLocaleString()}`;
            
            const summaryEl = document.getElementById('roast-summary');
            if (mTotal > 2000) summaryEl.innerText = "🚨 偵測到嚴重失血：這點錢拿去吃大餐不好嗎？";
            else if (mTotal > 0) summaryEl.innerText = "✅ 狀態正常：目前還在可控制的範圍。";
            else summaryEl.innerText = "💤 閒置中：尚未偵測到任何腦衝消費。";
        }
    </script>
</body>
</html>
