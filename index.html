<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂閱退散 - 最終修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --stranger-red: #ff0512;
            --deep-red: #a30000;
            --warning-orange: #ffc400;
        }

        body { 
            background-color: #080808; 
            color: #ffffff; 
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.6;
        }

        .stranger-title {
            font-weight: 900;
            color: var(--stranger-red);
            text-shadow: 0 0 15px var(--stranger-red);
            transform: skew(-3deg);
        }

        .neon-card {
            background: #121212;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
        }

        /* 輸入框加強 */
        input, select {
            background: #1a1a1a !important;
            border: 2px solid #333 !important;
            color: #ffffff !important;
            font-size: 1.1rem !important;
            padding: 1rem !important;
            width: 100%;
            border-radius: 8px !important;
            outline: none;
        }

        input:focus {
            border-color: var(--stranger-red) !important;
        }

        .label-text {
            font-size: 1rem;
            color: #b3b3b3;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }

        .btn-exorcise {
            background: var(--stranger-red);
            font-weight: 900;
            font-size: 1.2rem;
            padding: 1.2rem;
            border-radius: 8px;
            transition: 0.3s;
            width: 100%;
            color: white;
        }

        .btn-exorcise:active { transform: scale(0.98); }

        /* 列表內的數字與文字 */
        .sub-name { font-size: 1.5rem; font-weight: 900; font-style: italic; }
        .sub-price { font-size: 2rem; font-weight: 900; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-lg mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-6xl stranger-title mb-2">訂閱退散</h1>
            <p class="text-sm text-gray-400 tracking-[0.3em] font-bold">錢包守護者系統</p>
        </header>

        <!-- 總計數據 -->
        <div class="neon-card p-8 mb-8 border-l-8 border-l-red-600">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs text-gray-400 font-bold mb-1">平均每月損耗</p>
                    <h3 id="total-monthly" class="text-5xl font-black">$ 0</h3>
                </div>
                <div class="text-right">
                    <p class="text-xs text-red-500 font-black mb-1">年度累積失血</p>
                    <p id="total-yearly" class="text-2xl font-black text-red-500">$ 0</p>
                </div>
            </div>
            <p id="roast-summary" class="text-sm italic mt-6 text-gray-300 border-t border-gray-800 pt-4 font-bold"></p>
        </div>

        <!-- 儲存警告 -->
        <div class="mb-8 p-5 border-2 border-dashed border-yellow-600 bg-yellow-900/20 rounded-lg">
            <p class="text-sm text-yellow-500 font-black mb-1">⚠️ 重要：資料僅儲存在此裝置</p>
            <p class="text-sm text-gray-300">清除瀏覽器快取或更換裝置，紀錄會全部遺失。</p>
        </div>

        <!-- 輸入表單 -->
        <div class="neon-card p-6 mb-10">
            <div class="space-y-6">
                <div>
                    <label class="label-text">服務名稱</label>
                    <input id="sub-name" type="text" placeholder="例如：Netflix">
                </div>
                
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="label-text">金額</label>
                        <input id="sub-price" type="number" placeholder="0">
                    </div>
                    <div class="w-1/3">
                        <label class="label-text">週期</label>
                        <select id="sub-cycle">
                            <option value="1">月付</option>
                            <option value="3">季付</option>
                            <option value="12">年付</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="label-text text-red-400 font-black">📅 設定下次扣款日期</label>
                    <input id="sub-date" type="date">
                </div>

                <button onclick="addSubscription()" class="btn-exorcise">承認我是盤子並記錄</button>
            </div>
        </div>

        <!-- 清單 -->
        <h3 class="text-xl font-black mb-6 border-b-2 border-red-600 pb-2 inline-block">目前供奉清單</h3>
        <div id="sub-list" class="space-y-6 pb-20"></div>
    </div>

    <!-- 彈窗 -->
    <div id="alert-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[200]">
        <div class="neon-card border-4 border-red-600 p-8 w-full max-w-sm text-center">
            <h2 class="text-4xl font-black text-red-600 mb-4">快醒醒！</h2>
            <div id="alert-content" class="text-lg text-white mb-8"></div>
            <button onclick="closeAlert()" class="w-full py-4 bg-white text-black font-black rounded-lg">我有錢我任性</button>
        </div>
    </div>

    <script>
        let subs = JSON.parse(localStorage.getItem('my_subscriptions')) || [];

        window.onload = () => {
            render();
            checkWarnings();
        };

        function addSubscription() {
            const name = document.getElementById('sub-name').value;
            const price = parseFloat(document.getElementById('sub-price').value);
            const cycle = parseInt(document.getElementById('sub-cycle').value);
            const date = document.getElementById('sub-date').value;

            if (!name || isNaN(price) || !date) return alert("請填寫完整！");

            subs.push({ id: Date.now(), name, price, cycle, date });
            saveAndRender();
            document.getElementById('sub-name').value = '';
            document.getElementById('sub-price').value = '';
        }

        function saveAndRender() {
            localStorage.setItem('my_subscriptions', JSON.stringify(subs));
            render();
        }

        function checkWarnings() {
            const today = new Date();
            const limit = new Date();
            limit.setDate(today.getDate() + 3);
            let warnings = subs.filter(s => {
                const d = new Date(s.date);
                return d >= today && d <= limit;
            });
            if (warnings.length > 0) {
                document.getElementById('alert-modal').classList.remove('hidden');
                document.getElementById('alert-content').innerHTML = `近期扣款預告：<br><br>` + 
                    warnings.map(w => `<b>${w.name}</b> ($${w.price})`).join('<br>');
            }
        }

        function closeAlert() { document.getElementById('alert-modal').classList.add('hidden'); }

        function removeSub(id) {
            if(confirm("確定要刪除這筆嗎？")) {
                subs = subs.filter(s => s.id !== id);
                saveAndRender();
            }
        }

        function render() {
            const listEl = document.getElementById('sub-list');
            let mTotal = 0;
            subs.sort((a,b) => new Date(a.date) - new Date(b.date));
            listEl.innerHTML = '';

            subs.forEach(s => {
                const mPrice = s.price / s.cycle;
                mTotal += mPrice;
                const cycleText = s.cycle === 12 ? '年度' : (s.cycle === 3 ? '每季' : '每月');

                // 重新設計卡片內部的 Flex 結構
                listEl.innerHTML += `
                    <div class="neon-card p-6 border-t-2 border-t-gray-800">
                        <div class="flex flex-col gap-4">
                            <!-- 第一行：名稱與金額 -->
                            <div class="flex justify-between items-start">
                                <div class="max-w-[60%]">
                                    <h4 class="sub-name truncate uppercase">${s.name}</h4>
                                    <span class="text-xs bg-red-900/50 text-red-200 font-bold px-2 py-1 rounded inline-block mt-2">${cycleText}訂閱</span>
                                </div>
                                <div class="text-right">
                                    <p class="sub-price">$${s.price.toLocaleString()}</p>
                                    <p class="text-xs text-gray-400 font-bold mt-1">扣款日: ${s.date}</p>
                                </div>
                            </div>

                            <!-- 第二行：按鈕與換算（分開排列避免擠壓） -->
                            <div class="flex justify-between items-end border-t border-gray-800 pt-4 mt-2">
                                <span class="text-xs text-gray-500 font-bold">月平均:$${Math.round(mPrice)}</span>
                                <button onclick="removeSub(${s.id})" class="text-sm font-bold text-gray-500 hover:text-red-500 underline">
                                    刪除項目
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-monthly').innerText = `$ ${Math.round(mTotal).toLocaleString()}`;
            document.getElementById('total-yearly').innerText = `$ ${Math.round(mTotal * 12).toLocaleString()}`;
            
            const summaryEl = document.getElementById('roast-summary');
            if (mTotal > 2000) summaryEl.innerText = "🚨 偵測到嚴重失血：這點錢拿去吃大餐不好嗎？";
            else if (mTotal > 0) summaryEl.innerText = "✅ 狀態正常：目前還在控制範圍內。";
            else summaryEl.innerText = "💤 閒置中：尚未記錄任何開銷。";
        }
    </script>
</body>
</html>
