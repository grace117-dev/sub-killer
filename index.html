<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂閱退散 - 安全警告版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;900&display=swap');
        
        :root {
            --stranger-red: #e50914;
            --deep-red: #820000;
            --warning-orange: #ffae00;
        }

        body { 
            background-color: #020202; 
            color: #ffffff; 
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
        }

        /* 復古掃描線 */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .stranger-title {
            font-weight: 900;
            color: var(--stranger-red);
            text-shadow: 0 0 10px var(--stranger-red), 0 0 20px var(--deep-red);
            transform: skew(-5deg);
        }

        .neon-card {
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border: 1px solid #1a1111;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.8);
            position: relative;
        }

        /* 本地儲存警告閃爍 */
        .storage-warning {
            color: var(--warning-orange);
            text-shadow: 0 0 8px var(--warning-orange);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .stats-box { border-left: 4px solid var(--stranger-red); }

        input, select {
            background: #0a0a0a !important;
            border: 1px solid #222 !important;
            color: #ddd !important;
        }

        input:focus { border-color: var(--stranger-red) !important; box-shadow: 0 0 10px rgba(229, 9, 20, 0.4); }

        .btn-exorcise {
            background: var(--stranger-red);
            font-weight: 900;
            letter-spacing: 4px;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }
    </style>
</head>
<body class="p-5 md:p-10">

    <div class="max-w-md mx-auto relative z-10">
        <header class="text-center mb-10">
            <h1 class="text-6xl stranger-title mb-1">訂閱退散</h1>
            <p class="text-[10px] text-gray-500 tracking-[0.4em] uppercase">Local Storage System</p>
        </header>

        <!-- 數據面板 -->
        <div class="neon-card rounded-sm p-6 mb-8 stats-box">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[10px] text-gray-500 uppercase mb-1">平均每月損耗</p>
                    <h3 id="total-monthly" class="text-5xl font-black text-white">$ 0</h3>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-red-500 font-bold uppercase mb-1">年度累積失血</p>
                    <p id="total-yearly" class="text-xl font-black text-red-600">$ 0</p>
                </div>
            </div>
            <p id="roast-summary" class="text-[11px] italic mt-5 text-gray-400 border-t border-gray-900 pt-3 font-bold"></p>
        </div>

        <!-- 重要：儲存機制警告 -->
        <div class="mb-6 p-4 border border-dashed border-yellow-900 bg-yellow-950/20 rounded-sm">
            <p class="text-[11px] storage-warning font-bold flex items-center">
                <span class="mr-2">⚠️</span> 核心系統警告：
            </p>
            <p class="text-[10px] text-gray-400 mt-1 leading-relaxed">
                資料僅儲存在此裝置的瀏覽器中。**若清除瀏覽器快取 (Cookies/Cache)**，所有盤子紀錄將會永久灰飛煙滅，資本家會再次贏得勝利。
            </p>
        </div>

        <!-- 輸入區域 -->
        <div class="neon-card p-6 mb-10">
            <div class="space-y-4">
                <input id="sub-name" type="text" placeholder="服務名稱 (例如: Netflix)" class="w-full p-3 text-sm rounded-none outline-none">
                <div class="flex gap-2">
                    <input id="sub-price" type="number" placeholder="金額" class="flex-1 p-3 text-sm rounded-none outline-none">
                    <select id="sub-cycle" class="p-3 text-sm font-bold rounded-none outline-none">
                        <option value="1">月付</option>
                        <option value="3">季付</option>
                        <option value="12">年付</option>
                    </select>
                </div>
                <input id="sub-date" type="date" class="w-full p-3 text-sm rounded-none outline-none">
                <button onclick="addSubscription()" class="w-full btn-exorcise py-4 text-white text-xs hover:brightness-125 transition duration-500">
                    承認我是盤子並記錄
                </button>
            </div>
        </div>

        <!-- 列表區域 -->
        <div id="sub-list" class="space-y-6 pb-24 text-sm"></div>

        <!-- 底部隱私聲明 -->
        <footer class="text-center pb-10 opacity-30">
            <p class="text-[9px] tracking-widest text-gray-500 uppercase">Privacy Protocol: No Cloud. No Tracking. Only You and Your Regrets.</p>
        </footer>
    </div>

    <!-- 預警彈窗 -->
    <div id="alert-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-sm flex items-center justify-center p-8 z-[200]">
        <div class="neon-card border-2 border-red-600 p-8 w-full max-w-xs text-center">
            <h2 class="text-4xl font-black text-red-600 italic mb-3">快醒醒！</h2>
            <div id="alert-content" class="text-sm text-gray-300 leading-relaxed mb-8"></div>
            <button onclick="closeAlert()" class="w-full py-3 border-2 border-white text-white font-black hover:bg-white hover:text-black transition text-xs">我有錢我任性</button>
        </div>
    </div>

    <script>
        let subs = JSON.parse(localStorage.getItem('my_subscriptions')) || [];

        window.onload = () => {
            render();
            checkWarnings();
        };

        function addSubscription() {
            const name = document.getElementById('sub-name').value;
            const price = parseFloat(document.getElementById('sub-price').value);
            const cycle = parseInt(document.getElementById('sub-cycle').value);
            const date = document.getElementById('sub-date').value;

            if (!name || isNaN(price) || !date) return alert("填寫完整，別逃避！");

            subs.push({ id: Date.now(), name, price, cycle, date });
            saveAndRender();
            
            document.getElementById('sub-name').value = '';
            document.getElementById('sub-price').value = '';
        }

        function saveAndRender() {
            localStorage.setItem('my_subscriptions', JSON.stringify(subs));
            render();
        }

        function checkWarnings() {
            const today = new Date();
            const limit = new Date();
            limit.setDate(today.getDate() + 3);

            let warnings = subs.filter(s => {
                const d = new Date(s.date);
                return d >= today && d <= limit;
            });

            if (warnings.length > 0) {
                document.getElementById('alert-modal').classList.remove('hidden');
                document.getElementById('alert-content').innerHTML = `荷包預計失血：<br><br>` + 
                    warnings.map(w => `<span class="text-white font-bold">${w.name}</span> ($${w.price})`).join('<br>') +
                    `<br><br>現在去取消還來得及。`;
            }
        }

        function closeAlert() { document.getElementById('alert-modal').classList.add('hidden'); }

        function removeSub(id) {
            if(confirm("要剪掉這筆訂閱嗎？")) {
                subs = subs.filter(s => s.id !== id);
                saveAndRender();
            }
        }

        function render() {
            const listEl = document.getElementById('sub-list');
            let mTotal = 0;

            subs.sort((a,b) => new Date(a.date) - new Date(b.date));
            listEl.innerHTML = '';

            subs.forEach(s => {
                const mPrice = s.price / s.cycle;
                mTotal += mPrice;
                const cycleName = s.cycle === 12 ? '年付' : (s.cycle === 3 ? '季付' : '月付');

                listEl.innerHTML += `
                    <div class="neon-card p-5 rounded-sm relative">
                        <button onclick="removeSub(${s.id})" class="absolute top-3 right-4 text-[10px] text-gray-700 hover:text-red-600">刪除</button>
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="text-white font-black text-xl italic tracking-tighter uppercase">${s.name}</h4>
                                <span class="text-[9px] text-red-500 font-bold border border-red-900 px-2 py-0.5 mt-1 inline-block">${cycleName}</span>
                            </div>
                            <div class="text-right">
                                <p class="text-2xl font-black text-white tabular-nums">$${s.price.toLocaleString()}</p>
                                <p class="text-[9px] text-gray-600 mt-1">扣款日：${s.date}</p>
                            </div>
                        </div>
                        <div class="text-[10px] text-gray-500 border-t border-gray-900 pt-3 italic font-bold">
                            ⚠️ 月損：$${Math.round(mPrice)}。
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-monthly').innerText = `$ ${Math.round(mTotal).toLocaleString()}`;
            document.getElementById('total-yearly').innerText = `$ ${Math.round(mTotal * 12).toLocaleString()}`;
            
            const summaryEl = document.getElementById('roast-summary');
            if (mTotal > 2000) summaryEl.innerText = "🚨 系統警告：你的錢包正在被凌遲。";
            else if (mTotal > 0) summaryEl.innerText = "✅ 狀態穩定：暫時沒有破產風險。";
            else summaryEl.innerText = "💤 系統待命：尚未偵測到腦衝消費。";
        }
    </script>
</body>
</html>
