<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂閱退散 - 專業守護版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #050505; color: #39FF14; min-height: 100vh; }
        .card { background: #111; border: 1px solid #333; transition: all 0.3s; }
        .card:hover { border-color: #39FF14; box-shadow: 0 0 15px rgba(57, 255, 20, 0.1); }
        .roast-text { color: #FF3131; font-style: italic; }
        .warning-border { border-color: #FF3131 !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">💸 訂閱退散</h1>
            <p class="text-gray-500 text-sm">週期管理 x 扣款預警系統</p>
        </header>

        <!-- 總計看板 -->
        <div class="card rounded-xl p-6 mb-8 text-center">
            <p class="text-xs text-gray-400 uppercase tracking-widest">預估本月支出 (換算為月)</p>
            <h2 id="total-cost" class="text-5xl font-bold my-2 text-white">$ 0</h2>
            <p id="roast-summary" class="text-sm roast-text">正在掃描你的財務黑洞...</p>
        </div>

        <!-- 輸入區 -->
        <div class="card rounded-xl p-4 mb-8">
            <h3 class="text-lg font-bold mb-4 text-white">➕ 增加新的供奉項目</h3>
            <div class="space-y-3">
                <input id="sub-name" type="text" placeholder="服務名稱 (如: Netflix)" class="w-full bg-black border border-gray-700 p-2 rounded focus:border-green-500 outline-none text-white">
                
                <div class="flex gap-2">
                    <input id="sub-price" type="number" placeholder="金額" class="flex-1 bg-black border border-gray-700 p-2 rounded focus:border-green-500 outline-none text-white">
                    <select id="sub-cycle" class="bg-black border border-gray-700 p-2 rounded text-white outline-none">
                        <option value="1">每月</option>
                        <option value="3">每季</option>
                        <option value="12">每年</option>
                    </select>
                </div>

                <div class="text-xs text-gray-500 mb-1 text-left">下次扣款日期：</div>
                <input id="sub-date" type="date" class="w-full bg-black border border-gray-700 p-2 rounded focus:border-green-500 outline-none text-white">
                
                <button onclick="addSubscription()" class="w-full bg-green-600 hover:bg-green-500 text-black font-bold py-2 rounded mt-2 transition">
                    確認加入盤子清單
                </button>
            </div>
        </div>

        <!-- 列表區 -->
        <div id="sub-list" class="space-y-4 pb-20"></div>
    </div>

    <!-- 預警彈窗 (Toast) -->
    <div id="alert-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center p-6 z-50">
        <div class="bg-red-900 border-2 border-red-500 p-6 rounded-2xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold text-white mb-4">⚠️ 奪命預警</h2>
            <div id="alert-content" class="text-white mb-6 space-y-2 text-sm leading-relaxed"></div>
            <button onclick="closeAlert()" class="bg-white text-red-900 font-bold py-2 px-8 rounded-full">我知道了 (哭)</button>
        </div>
    </div>

    <script>
        let subs = JSON.parse(localStorage.getItem('my_subscriptions')) || [];

        const roasts = [
            "這錢拿去買股不好嗎？非要送給大老闆抽雪茄。",
            "你真的有在看嗎？還是只是在買『我跟得上時代』的幻覺？",
            "這筆扣款是你離退休又遠了一步的證明。",
            "別看了，你的錢包正在求救。",
            "買這什麼東西？你的人生會因為這幾百塊變好嗎？"
        ];

        window.onload = () => {
            checkWarnings();
            render();
        };

        function addSubscription() {
            const name = document.getElementById('sub-name').value;
            const price = parseFloat(document.getElementById('sub-price').value);
            const cycle = parseInt(document.getElementById('sub-cycle').value);
            const date = document.getElementById('sub-date').value;

            if (!name || isNaN(price) || !date) {
                alert("日期跟金額填好！不要逃避現實！");
                return;
            }

            const roast = roasts[Math.floor(Math.random() * roasts.length)];
            subs.push({ id: Date.now(), name, price, cycle, date, roast });
            saveAndRender();
            
            // 清空
            document.getElementById('sub-name').value = '';
            document.getElementById('sub-price').value = '';
        }

        function saveAndRender() {
            localStorage.setItem('my_subscriptions', JSON.stringify(subs));
            render();
        }

        function checkWarnings() {
            const today = new Date();
            const threeDaysLater = new Date();
            threeDaysLater.setDate(today.getDate() + 3);

            let warningItems = subs.filter(sub => {
                const subDate = new Date(sub.date);
                return subDate >= today && subDate <= threeDaysLater;
            });

            if (warningItems.length > 0) {
                const modal = document.getElementById('alert-modal');
                const content = document.getElementById('alert-content');
                modal.classList.remove('hidden');
                
                let html = "以下項目 <b>3天內</b> 就要扣款了：<br><br>";
                warningItems.forEach(item => {
                    html += `❌ <b>${item.name}</b> ($${item.price})<br>`;
                });
                html += "<br>現在去取消還來得及，別說我沒提醒你！";
                content.innerHTML = html;
            }
        }

        function closeAlert() {
            document.getElementById('alert-modal').classList.add('hidden');
        }

        function removeSub(id) {
            if(confirm("真的要砍掉這個項目嗎？")) {
                subs = subs.filter(s => s.id !== id);
                saveAndRender();
            }
        }

        function render() {
            const listEl = document.getElementById('sub-list');
            const totalEl = document.getElementById('total-cost');
            const summaryEl = document.getElementById('roast-summary');
            
            listEl.innerHTML = '';
            let monthlyTotal = 0;

            // 排序：日期近的在前面
            subs.sort((a, b) => new Date(a.date) - new Date(b.date));

            subs.forEach(sub => {
                // 換算月費
                monthlyTotal += (sub.price / sub.cycle);
                
                const cycleText = sub.cycle === 1 ? "每月" : (sub.cycle === 3 ? "每季" : "每年");
                const isUrgent = (new Date(sub.date) - new Date()) / (1000*60*60*24) <= 3;

                listEl.innerHTML += `
                    <div class="card rounded-xl p-4 relative ${isUrgent ? 'warning-border' : ''}">
                        <button onclick="removeSub(${sub.id})" class="absolute top-2 right-2 text-gray-600 hover:text-red-500 text-sm">✕</button>
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <span class="text-white font-bold text-lg">${sub.name}</span>
                                <span class="ml-2 text-[10px] bg-gray-800 px-2 py-0.5 rounded text-gray-400">${cycleText}</span>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-mono">$${sub.price}</div>
                                <div class="text-[10px] text-gray-500">下次：${sub.date}</div>
                            </div>
                        </div>
                        <p class="text-xs roast-text mt-2 border-t border-gray-900 pt-2">💬 ${sub.roast}</p>
                    </div>
                `;
            });

            totalEl.innerText = `$ ${Math.round(monthlyTotal).toLocaleString()}`;
            summaryEl.innerText = monthlyTotal > 2000 ? "你的錢包正在大噴血，這金額夠買好幾股台積電了！" : "目前的失血量還在控制範圍內。";
        }
    </script>
</body>
</html>
