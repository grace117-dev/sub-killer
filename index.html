<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂閱退散 - STRANGER STYLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            min-height: 100vh; 
        }

        /* 怪奇物語風格標題 */
        .stranger-title {
            color: #e50914;
            text-shadow: 0 0 10px #e50914, 0 0 20px #820000;
            font-weight: 900;
            letter-spacing: -2px;
            font-style: italic;
        }

        /* 核心卡片風格：深黑背景 + 紅色發光邊框 */
        .card { 
            background: #0a0a0a; 
            border: 2px solid #1a1a1a; 
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.05);
            transition: all 0.3s ease;
        }

        .card:hover { 
            border-color: #e50914; 
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.3);
        }

        /* 警告狀態：強烈的紅色呼吸燈 */
        .warning-mode {
            border-color: #ff0000 !important;
            animation: danger-pulse 1.5s infinite alternate;
        }

        @keyframes danger-pulse {
            from { box-shadow: 0 0 5px #820000; }
            to { box-shadow: 0 0 25px #ff0000; }
        }

        .roast-text { 
            color: #ff4d4d; 
            font-size: 0.75rem;
            border-top: 1px solid #1a1a1a;
            padding-top: 0.75rem;
            margin-top: 0.75rem;
        }

        /* 輸入框美化 */
        input, select {
            background: #111 !important;
            border: 1px solid #222 !important;
            color: #fff !important;
            outline: none !important;
        }

        input:focus, select:focus {
            border-color: #e50914 !important;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.2);
        }

        .btn-red {
            background-color: #e50914;
            color: white;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-red:hover {
            background-color: #ff0f1b;
            box-shadow: 0 0 20px #e50914;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl stranger-title mb-1">訂閱退散</h1>
            <p class="text-gray-500 text-xs tracking-widest uppercase">SUBSCRIPTION KILLER</p>
        </header>

        <!-- 總計看板 -->
        <div class="card rounded-lg p-6 mb-8 text-center border-b-4 border-b-red-700">
            <p class="text-[10px] text-gray-500 uppercase tracking-tighter">本月預計失血量</p>
            <h2 id="total-cost" class="text-5xl font-black my-2 text-white tabular-nums">$ 0</h2>
            <p id="roast-summary" class="text-sm text-red-500 font-bold">準備好面對現實了嗎？</p>
        </div>

        <!-- 輸入區 -->
        <div class="card rounded-lg p-5 mb-10">
            <h3 class="text-xs font-bold mb-4 text-gray-400 uppercase tracking-widest">新增供奉清單</h3>
            <div class="space-y-4">
                <input id="sub-name" type="text" placeholder="服務名稱 (Netflix, etc.)" class="w-full p-3 rounded">
                
                <div class="flex gap-2">
                    <input id="sub-price" type="number" placeholder="金額" class="flex-1 p-3 rounded">
                    <select id="sub-cycle" class="p-3 rounded">
                        <option value="1">每月</option>
                        <option value="3">每季</option>
                        <option value="12">每年</option>
                    </select>
                </div>

                <div>
                    <p class="text-[10px] text-gray-500 mb-1">下一次扣款日期</p>
                    <input id="sub-date" type="date" class="w-full p-3 rounded text-sm">
                </div>
                
                <button onclick="addSubscription()" class="w-full btn-red py-3 rounded">
                    承認我是盤子並儲存
                </button>
            </div>
        </div>

        <!-- 清單 -->
        <div id="sub-list" class="space-y-4 pb-24"></div>
    </div>

    <!-- 預警彈窗 -->
    <div id="alert-modal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center p-6 z-50">
        <div class="card border-2 border-red-600 p-8 rounded-xl max-w-sm w-full text-center">
            <h2 class="text-3xl font-black text-red-600 mb-2 italic">警告！</h2>
            <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest">偵測到荷包大失血</p>
            <div id="alert-content" class="text-white mb-8 space-y-2 text-sm"></div>
            <button onclick="closeAlert()" class="w-full bg-white text-black font-black py-3 rounded hover:bg-red-600 hover:text-white transition">我知道了</button>
        </div>
    </div>

    <script>
        let subs = JSON.parse(localStorage.getItem('my_subscriptions')) || [];

        const roasts = [
            "這筆錢夠買 3 份排骨飯了，你確定這服務比肚子重要？",
            "偵測到盤子行為。資本家的尾牙獎金感謝您的貢獻。",
            "上次打開它是什麼時候？上個世紀嗎？",
            "這筆扣款是你離財富自由又遠了一公分的證明。",
            "你家沙發是鑲金的嗎？買這麼多串流是要看到投胎？"
        ];

        window.onload = () => {
            checkWarnings();
            render();
        };

        function addSubscription() {
            const name = document.getElementById('sub-name').value;
            const price = parseFloat(document.getElementById('sub-price').value);
            const cycle = parseInt(document.getElementById('sub-cycle').value);
            const date = document.getElementById('sub-date').value;

            if (!name || isNaN(price) || !date) {
                alert("把資料填好！別想逃避！");
                return;
            }

            const roast = roasts[Math.floor(Math.random() * roasts.length)];
            subs.push({ id: Date.now(), name, price, cycle, date, roast });
            saveAndRender();
            
            document.getElementById('sub-name').value = '';
            document.getElementById('sub-price').value = '';
        }

        function saveAndRender() {
            localStorage.setItem('my_subscriptions', JSON.stringify(subs));
            render();
        }

        function checkWarnings() {
            const today = new Date();
            const threeDaysLater = new Date();
            threeDaysLater.setDate(today.getDate() + 3);

            let warningItems = subs.filter(sub => {
                const subDate = new Date(sub.date);
                return subDate >= today && subDate <= threeDaysLater;
            });

            if (warningItems.length > 0) {
                const modal = document.getElementById('alert-modal');
                const content = document.getElementById('alert-content');
                modal.classList.remove('hidden');
                
                let html = "以下項目 <b>3天內</b> 就要扣錢了：<br><br>";
                warningItems.forEach(item => {
                    html += `💔 <b>${item.name}</b> ($${item.price})<br>`;
                });
                html += "<br>快去取消，否則就沒錢買台積電了！";
                content.innerHTML = html;
            }
        }

        function closeAlert() {
            document.getElementById('alert-modal').classList.add('hidden');
        }

        function removeSub(id) {
            if(confirm("確定要剪掉這筆訂閱嗎？")) {
                subs = subs.filter(s => s.id !== id);
                saveAndRender();
            }
        }

        function render() {
            const listEl = document.getElementById('sub-list');
            const totalEl = document.getElementById('total-cost');
            const summaryEl = document.getElementById('roast-summary');
            
            listEl.innerHTML = '';
            let monthlyTotal = 0;

            subs.sort((a, b) => new Date(a.date) - new Date(b.date));

            subs.forEach(sub => {
                monthlyTotal += (sub.price / sub.cycle);
                const cycleText = sub.cycle === 1 ? "每月" : (sub.cycle === 3 ? "每季" : "每年");
                const today = new Date();
                const target = new Date(sub.date);
                const diff = Math.ceil((target - today) / (1000*60*60*24));
                const isUrgent = diff <= 3 && diff >= 0;

                listEl.innerHTML += `
                    <div class="card p-4 rounded-lg relative ${isUrgent ? 'warning-mode' : ''}">
                        <button onclick="removeSub(${sub.id})" class="absolute top-2 right-2 text-gray-700 hover:text-red-500 text-xs">✕</button>
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-white font-black text-xl italic">${sub.name}</span>
                                <span class="ml-2 text-[10px] text-red-500 font-bold">${cycleText}</span>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black text-white">$${sub.price}</div>
                                <div class="text-[10px] text-gray-500">日期: ${sub.date}</div>
                            </div>
                        </div>
                        <p class="roast-text italic">
                            💬 ${sub.roast}
                        </p>
                    </div>
                `;
            });

            totalEl.innerText = `$ ${Math.round(monthlyTotal).toLocaleString()}`;
            summaryEl.innerText = monthlyTotal > 2000 ? "警報：你的錢包正在被資本家凌遲。" : "目前失血量尚可，維持生命徵象。";
        }
    </script>
</body>
</html>
