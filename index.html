<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂閱小溫室 - 森林系手帳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --forest-dark: #2C4C3B;
            --forest-main: #4A7C59;
            --forest-light: #8FC0A9;
            --forest-bg: #F4F1EA;
            --wood-color: #8B5A2B;
            --text-main: #3E4C45;
            --text-sub: #7A8B83;
            --alert-color: #D97757;
        }

        body { 
            background-color: var(--forest-bg); 
            color: var(--text-main); 
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.6;
            background-image: radial-gradient(#e0dcd3 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .forest-title {
            font-weight: 900;
            color: var(--forest-dark);
            text-shadow: 2px 2px 0px rgba(143, 192, 169, 0.4);
        }

        .nature-card {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            box-shadow: 0 10px 25px rgba(74, 124, 89, 0.08);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        /* ⚠️ 臨近扣款日的警告樣式 (溫和版) */
        .urgent-card {
            background: #FFF7F5 !important;
            border: 2px solid var(--alert-color) !important;
            box-shadow: 0 0 15px rgba(217, 119, 87, 0.2);
        }

        input, select {
            background: #F8FAF9 !important;
            border: 2px solid #E2E8F0 !important;
            color: var(--text-main) !important;
            font-size: 1.05rem !important;
            padding: 0.8rem 1rem !important;
            width: 100%;
            border-radius: 12px !important;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus { border-color: var(--forest-main) !important; }

        .label-text {
            font-size: 0.95rem;
            color: var(--forest-main);
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }

        .btn-plant {
            background: var(--forest-main);
            font-weight: 700;
            font-size: 1.1rem;
            padding: 1rem;
            border-radius: 12px;
            width: 100%;
            color: white;
            box-shadow: 0 4px 10px rgba(74, 124, 89, 0.3);
        }
        .btn-plant:hover { background: var(--forest-dark); transform: translateY(-2px); }

        .sub-name { font-size: 1.4rem; font-weight: 900; color: var(--forest-dark); }
        .sub-price { font-size: 1.8rem; font-weight: 900; color: var(--forest-main); font-variant-numeric: tabular-nums; }

        /* 徽章樣式 */
        .badge-icon { font-size: 2.5rem; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.1)); }
        .badge-locked { filter: grayscale(100%) opacity(0.3); }
        
        .category-bar { height: 8px; border-radius: 4px; background: #eee; overflow: hidden; display: flex; mt-2; }
        .cat-segment { height: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-lg mx-auto">
        <header class="text-center mb-8 pt-4">
            <h1 class="text-4xl md:text-5xl forest-title mb-2">🌿 訂閱小溫室</h1>
            <p class="text-sm text-gray-500 font-bold tracking-widest">你的個人數位植栽手帳</p>
        </header>

        <!-- 成就系統：龜背芋溫室 -->
        <div class="nature-card p-6 mb-8 bg-gradient-to-br from-white to-green-50 border-t-4 border-t-[#8FC0A9]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-black text-[#2C4C3B]">🏆 我的龜背芋溫室</h3>
                <p class="text-sm font-bold text-[#4A7C59]">累積省下: <span id="total-saved-display" class="text-xl">$0</span></p>
            </div>
            <p class="text-xs text-gray-500 mb-4">修剪(刪除)不需要的訂閱，省下的養分會培育出稀有龜背芋！</p>
            <div class="flex justify-between items-end gap-2 overflow-x-auto pb-2" id="badge-container">
                <!-- 徽章將透過 JS 渲染 -->
            </div>
        </div>

        <!-- 總計數據與分類分析 -->
        <div class="nature-card p-6 mb-8">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-xs text-gray-500 font-bold mb-1">每月灌溉水量 (總支出)</p>
                    <h3 id="total-monthly" class="text-4xl font-black text-[#2C4C3B]">$ 0</h3>
                </div>
                <div class="text-right">
                    <p class="text-xs text-[#8B5A2B] font-black mb-1">年度總灌溉量</p>
                    <p id="total-yearly" class="text-xl font-black text-[#8B5A2B]">$ 0</p>
                </div>
            </div>
            
            <!-- 類別分析 -->
            <div class="border-t border-gray-100 pt-4 mt-2">
                <p class="text-sm font-bold text-gray-600 mb-2">📊 養分分佈分析</p>
                <div id="category-bars" class="category-bar mb-3"></div>
                <div id="category-legend" class="flex flex-wrap gap-3 text-xs font-bold"></div>
            </div>
        </div>

        <!-- 輸入表單 -->
        <div class="nature-card p-6 mb-10">
            <h3 class="text-lg font-black text-[#2C4C3B] mb-4">🌱 種下新的訂閱</h3>
            <div class="space-y-5">
                <div>
                    <label class="label-text">植物名稱 (服務名稱)</label>
                    <input id="sub-name" type="text" placeholder="例如：Netflix、Spotify">
                </div>
                
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="label-text">需要水量 (金額)</label>
                        <input id="sub-price" type="number" placeholder="0">
                    </div>
                    <div class="w-1/3">
                        <label class="label-text">週期</label>
                        <select id="sub-cycle">
                            <option value="1">每月</option>
                            <option value="3">每季</option>
                            <option value="12">每年</option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="label-text">屬性分類</label>
                        <select id="sub-category">
                            <option value="entertainment">🍿 娛樂追劇</option>
                            <option value="music">🎵 音樂串流</option>
                            <option value="work">💼 工作生產力</option>
                            <option value="learning">📚 學習進修</option>
                            <option value="utility">🔧 生活工具</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="label-text" style="color: #D97757;">📅 下次灌溉日</label>
                        <input id="sub-date" type="date">
                    </div>
                </div>

                <button onclick="addSubscription()" class="btn-plant transition">種下這株訂閱</button>
            </div>
        </div>

        <!-- 清單 -->
        <h3 class="text-xl font-black mb-4 text-[#2C4C3B] flex items-center gap-2">
            <span>🪴 目前照料的植物們</span>
        </h3>
        <div id="sub-list" class="space-y-4 pb-20"></div>
    </div>

    <script>
        let subs = JSON.parse(localStorage.getItem('my_forest_subs')) || [];
        let totalSaved = parseFloat(localStorage.getItem('my_forest_saved')) || 0;

        const categoryInfo = {
            'entertainment': { name: '娛樂', color: '#FFB3BA' },
            'music': { name: '音樂', color: '#BAE1FF' },
            'work': { name: '工作', color: '#BAFFC9' },
            'learning': { name: '學習', color: '#FFFFBA' },
            'utility': { name: '工具', color: '#E0BBE4' }
        };

        const achievements = [
            { threshold: 100, title: '初生小葉', desc: '普通綠斑', icon: '🌱' },
            { threshold: 500, title: '白斑新星', desc: '稀有白斑', icon: '🤍' },
            { threshold: 1500, title: '黃金脈絡', desc: '史詩黃斑', icon: '💛' },
            { threshold: 3000, title: '薄荷微風', desc: '傳說薄荷斑', icon: '🌿' },
            { threshold: 5000, title: '粉紅奇蹟', desc: '神話粉斑', icon: '🌸' }
        ];

        window.onload = () => { 
            render(); 
        };

        function addSubscription() {
            const name = document.getElementById('sub-name').value;
            const price = parseFloat(document.getElementById('sub-price').value);
            const cycle = parseInt(document.getElementById('sub-cycle').value);
            const category = document.getElementById('sub-category').value;
            const date = document.getElementById('sub-date').value;
            
            if (!name || isNaN(price) || !date) return alert("請給植物完整的生長資訊喔！");
            
            subs.push({ id: Date.now(), name, price, cycle, category, date });
            saveAndRender();
            
            document.getElementById('sub-name').value = '';
            document.getElementById('sub-price').value = '';
        }

        function saveAndRender() {
            localStorage.setItem('my_forest_subs', JSON.stringify(subs));
            localStorage.setItem('my_forest_saved', totalSaved);
            render();
        }

        function removeSub(id, monthlyCost) {
            if(confirm("確定要修剪(刪除)這個項目嗎？省下的每月費用將化為龜背芋的養分喔！")) {
                totalSaved += monthlyCost; // 將省下的每月花費加入養分
                subs = subs.filter(s => s.id !== id);
                saveAndRender();
            }
        }

        function render() {
            const listEl = document.getElementById('sub-list');
            let mTotal = 0;
            let catTotals = { entertainment: 0, music: 0, work: 0, learning: 0, utility: 0 };
            
            const today = new Date().setHours(0,0,0,0);
            const threeDaysLater = new Date();
            threeDaysLater.setDate(new Date().getDate() + 3);

            subs.sort((a,b) => new Date(a.date) - new Date(b.date));
            listEl.innerHTML = '';

            subs.forEach(s => {
                const mPrice = s.price / s.cycle;
                mTotal += mPrice;
                if(catTotals[s.category] !== undefined) catTotals[s.category] += mPrice;
                
                const subDate = new Date(s.date).setHours(0,0,0,0);
                const isUrgent = subDate >= today && subDate <= threeDaysLater.setHours(23,59,59,999);
                const isExpired = subDate < today;

                const cycleText = s.cycle === 12 ? '年繳' : (s.cycle === 3 ? '季繳' : '月繳');
                const catInfo = categoryInfo[s.category] || categoryInfo['utility'];

                listEl.innerHTML += `
                    <div class="nature-card p-5 ${isUrgent ? 'urgent-card' : ''} ${isExpired ? 'opacity-60' : ''}">
                        <div class="flex flex-col gap-3">
                            <div class="flex justify-between items-start">
                                <div class="max-w-[60%]">
                                    <h4 class="sub-name truncate">${s.name}</h4>
                                    <div class="flex gap-2 mt-2">
                                        <span class="text-xs bg-gray-100 text-gray-600 font-bold px-2 py-1 rounded-md">${cycleText}</span>
                                        <span class="text-xs font-bold px-2 py-1 rounded-md" style="background-color: ${catInfo.color}40; color: #555;">${catInfo.name}</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="sub-price">$${s.price.toLocaleString()}</p>
                                    <p class="text-xs ${isUrgent ? 'text-[#D97757]' : 'text-gray-400'} font-bold mt-1">下次扣款: ${s.date}</p>
                                </div>
                            </div>
                            <div class="flex justify-between items-end border-t border-gray-100 pt-3 mt-1">
                                <span class="text-xs ${isUrgent ? 'text-[#D97757] font-black' : 'text-gray-400'} font-bold">
                                    ${isUrgent ? '⚠️ 需要注意：即將扣款囉！' : '換算每月: $'+Math.round(mPrice)}
                                </span>
                                <button onclick="removeSub(${s.id}, ${mPrice})" class="text-sm font-bold text-red-400 hover:text-red-600 bg-red-50 px-3 py-1 rounded-full transition">
                                    ✂️ 修剪雜草
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            // 更新總金額
            document.getElementById('total-monthly').innerText = `$ ${Math.round(mTotal).toLocaleString()}`;
            document.getElementById('total-yearly').innerText = `$ ${Math.round(mTotal * 12).toLocaleString()}`;

            // 更新類別分析圓餅圖(橫條)
            const catBarEl = document.getElementById('category-bars');
            const catLegendEl = document.getElementById('category-legend');
            catBarEl.innerHTML = '';
            catLegendEl.innerHTML = '';
            
            if (mTotal > 0) {
                for (const [key, value] of Object.entries(catTotals)) {
                    if (value > 0) {
                        const percent = (value / mTotal) * 100;
                        const color = categoryInfo[key].color;
                        catBarEl.innerHTML += `<div class="cat-segment" style="width: ${percent}%; background-color: ${color};"></div>`;
                        catLegendEl.innerHTML += `<div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full" style="background-color: ${color};"></div><span class="text-gray-600">${categoryInfo[key].name} ${Math.round(percent)}%</span></div>`;
                    }
                }
            } else {
                catBarEl.innerHTML = `<div class="cat-segment" style="width: 100%; background-color: #e2e8f0;"></div>`;
                catLegendEl.innerHTML = `<span class="text-gray-400">尚未有養分資料</span>`;
            }

            // 更新溫室成就系統
            document.getElementById('total-saved-display').innerText = `$${Math.round(totalSaved).toLocaleString()}`;
            const badgeContainer = document.getElementById('badge-container');
            badgeContainer.innerHTML = '';

            achievements.forEach(ach => {
                const isUnlocked = totalSaved >= ach.threshold;
                badgeContainer.innerHTML += `
                    <div class="flex flex-col items-center text-center w-1/5 min-w-[60px]">
                        <div class="badge-icon ${isUnlocked ? '' : 'badge-locked'} mb-1">${ach.icon}</div>
                        <p class="text-[10px] font-black ${isUnlocked ? 'text-[#4A7C59]' : 'text-gray-400'}">${ach.title}</p>
                        <p class="text-[9px] ${isUnlocked ? 'text-[#8B5A2B]' : 'text-gray-300'}">${ach.desc}</p>
                        <p class="text-[8px] text-gray-400 mt-1">$${ach.threshold}</p>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
